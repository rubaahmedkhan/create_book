services:
  # Auth Service (Better Auth / Node.js)
  - type: web
    name: physical-ai-auth
    runtime: node
    rootDir: auth-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: TRUSTED_ORIGINS
        sync: false

  # FastAPI Backend
  - type: web
    name: physical-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SERVICE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
